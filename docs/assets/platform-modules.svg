<svg width="1500" height="650" viewBox="0 0 1500 650" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FindIt platform modules</title>
  <desc id="desc">Four listing modules and the secure real-time chat that connects them.</desc>
  <defs>
