    <linearGradient id="brand" x1="600" y1="200" x2="900" y2="480" gradientUnits="userSpaceOnUse"><stop stop-color="#FF9B57"/><stop offset="1" stop-color="#EA580C"/></linearGradient>
  </defs>
  <rect width="1500" height="650" rx="32" fill="#FFFFFF"/>
  <text x="750" y="62" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="36" font-weight="800" fill="#111827">Everything your campus shares — in one place</text>
  <text x="750" y="101" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#6B7280">Four structured listing workflows connected through one identity, one feed and one secure messaging layer.</text>

  <path d="M750 320L318 218M750 320L1182 218M750 320L318 490M750 320L1182 490" stroke="#FED7AA" stroke-width="5" stroke-linecap="round"/>

  <g transform="translate(590 205)">
